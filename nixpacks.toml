# ==========================================================
# JobsUG Railway Deployment Configuration
# Laravel 13 + PHP 8.4 + Filament 5 + PostgreSQL
# Mirrors Render deployment architecture
# ==========================================================


# ----------------------------------------------------------
# PHP Runtime + Required Extensions
# ----------------------------------------------------------

[phases.setup]

nixPkgs = [
    "php84",
    "php84Packages.composer",

    # Laravel requirements
    "php84Extensions.curl",
    "php84Extensions.dom",
    "php84Extensions.fileinfo",
    "php84Extensions.mbstring",
    "php84Extensions.openssl",
    "php84Extensions.pdo",
    "php84Extensions.pdo_pgsql",
    "php84Extensions.tokenizer",
    "php84Extensions.xml",

    # Filament / Spatie requirements
    "php84Extensions.intl",
    "php84Extensions.zip",
    "php84Extensions.exif",

    # Performance
    "php84Extensions.opcache"
]


# ----------------------------------------------------------
# Composer Installation
# ----------------------------------------------------------

[phases.install]

cmds = [
    "composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev"
]


# ----------------------------------------------------------
# Node / Vite Frontend Build
# ----------------------------------------------------------

[phases.build]

cmds = [

    # Install frontend dependencies
    "npm ci",

    # Compile Tailwind/Vite assets
    "npm run build",


    # Laravel production preparation

    "php artisan storage:link || true",

    "php artisan config:cache",

    "php artisan event:cache",

    "php artisan route:cache",

    "php artisan view:cache"
]


# ----------------------------------------------------------
# Runtime Environment
# ----------------------------------------------------------

[start]

cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
